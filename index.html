<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/qelevate_logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QElevate — Health Record Infrastructure</title>
    <meta name="description" content="QElevate is a healthcare technology company developing infrastructure for innovations in the electronic health record space, with patients first and physicians first." />

    <!-- Open Graph -->
    <meta property="og:title" content="QElevate — Health Record Infrastructure" />
    <meta property="og:description" content="QElevate is a healthcare technology company developing infrastructure for innovations in the electronic health record space, with patients first and physicians first." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://qelevate.in" />
    <meta property="og:image" content="/qelevate_logo.svg" />
    <meta property="og:site_name" content="QElevate" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="QElevate — Health Record Infrastructure" />
    <meta name="twitter:description" content="QElevate is a healthcare technology company developing infrastructure for innovations in the electronic health record space, with patients first and physicians first." />
    <meta name="twitter:image" content="/qelevate_logo.svg" />

    <!-- Prevent flash of wrong theme -->
    <script>
      try {
        if (localStorage.getItem('theme') !== 'light') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
